deptrac:
  paths:
    - src

  layers:
    - name: Core
      collectors:
        - type: directory
          value: src/Core/.*
        - type: directory
          value: src/Attribute/.*
    - name: Config
      collectors:
        - type: directory
          value: src/Config/.*
    - name: Discovery
      collectors:
        - type: directory
          value: src/Discovery/.*
    - name: Expect
      collectors:
        - type: directory
          value: src/Expect/.*
    - name: Capture
      collectors:
        - type: directory
          value: src/Capture/.*
    - name: Harness
      collectors:
        - type: directory
          value: src/Harness/.*
    - name: Doubles
      collectors:
        - type: directory
          value: src/Doubles/.*
    - name: Coverage
      collectors:
        - type: directory
          value: src/Coverage/.*
    - name: Plugin
      collectors:
        - type: directory
          value: src/Plugin/.*
    - name: Reporting
      collectors:
        - type: directory
          value: src/Reporting/.*
    - name: Runner
      collectors:
        - type: directory
          value: src/Runner/.*
    - name: Cli
      collectors:
        - type: directory
          value: src/Cli/.*

  ruleset:
    Core: []
    Config: [Core]
    Discovery: [Core]
    Expect: [Core]
    Capture: [Core]
    Harness: [Core]
    Doubles: [Core, Expect, Harness]
    Coverage: [Core]
    Plugin: [Core, Harness]
    Reporting: [Core]
    Runner: [Core, Config, Discovery, Expect, Capture, Harness, Doubles, Coverage, Plugin, Reporting]
    Cli: [Core, Config, Discovery, Runner]
