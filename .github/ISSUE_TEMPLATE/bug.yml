name: Bug report
description: Report a defect in Greenlight
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest test class, config, and command that reproduce the problem.
      placeholder: |
        ```php
        // test class and config here
        ```
        Command: bin/greenlight ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include full output or a stack trace where relevant.
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.5"
    validations:
      required: true
  - type: input
    id: greenlight-version
    attributes:
      label: Greenlight version
      placeholder: "e.g. 0.1.0 or a commit hash"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04, macOS 26"
    validations:
      required: true
