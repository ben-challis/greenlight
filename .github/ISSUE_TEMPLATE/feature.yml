name: Feature request
description: Propose a new capability for Greenlight
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: api-sketch
    attributes:
      label: Proposed API sketch
      description: Rough typed PHP showing how a test author or plugin would use it.
      placeholder: |
        ```php
        // attribute, method, or config sketch here
        ```
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other designs you thought about and why you set them aside.
    validations:
      required: false
  - type: dropdown
    id: rfc
    attributes:
      label: Willing to write an RFC?
      description: Interface-changing work needs an RFC in docs/rfcs/ before implementation.
      options:
        - "Yes"
        - "No"
        - "Not sure yet"
    validations:
      required: true
